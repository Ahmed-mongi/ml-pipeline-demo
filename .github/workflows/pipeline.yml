name: ML Validation and Deployment Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  validate:
    name: Train & Validate Model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate sample data (no DVC remote needed)
        run: |
          python -c "
          from sklearn.datasets import load_iris
          import pandas as pd, os
          os.makedirs('data', exist_ok=True)
          X, y = load_iris(return_X_y=True, as_frame=True)
          import pandas as pd
          pd.concat([X, y], axis=1).to_csv('data/iris.csv', index=False)
          print('Data ready')
          "

      - name: Train model and log to MLflow
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python train.py

      - name: Verify model_info.txt was created
        run: |
          if [ ! -f model_info.txt ]; then
            echo "ERROR: model_info.txt not found"
            exit 1
          fi
          echo "Run ID: $(cat model_info.txt)"

      - name: Upload model_info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt
          retention-days: 7

  deploy:
    name: Check Threshold & Deploy
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install mlflow

      - name: Download model_info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Show downloaded Run ID
        run: echo "Run ID is $(cat model_info.txt)"

      - name: Check accuracy threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python check_threshold.py

      - name: Mock Docker build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"
